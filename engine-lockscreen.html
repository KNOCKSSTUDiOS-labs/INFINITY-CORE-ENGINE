<section id="lockscreen" class="lockscreen hidden">

  <div class="lockscreen-clock">
    <div id="ls-time" class="ls-time">00:00</div>
    <div id="ls-date" class="ls-date">Loading...</div>
  </div>

  <div class="lockscreen-notifications">
    <div class="ls-notice">No new notifications</div>
  </div>

  <div class="lockscreen-swipe">
    <span>Swipe Up to Unlock</span>
  </div>

</section>

<script>
  document.addEventListener("DOMContentLoaded", () => {

    /* CLOCK UPDATE */
    function updateClock() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, "0");
      const minutes = now.getMinutes().toString().padStart(2, "0");
      const date = now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });

      document.getElementById("ls-time").textContent = `${hours}:${minutes}`;
      document.getElementById("ls-date").textContent = date;
    }

    updateClock();
    setInterval(updateClock, 1000);

    /* UNLOCK GESTURE */
    const lockscreen = document.getElementById("lockscreen");

    lockscreen.addEventListener("click", () => {
      lockscreen.classList.add("unlocking");
      setTimeout(() => lockscreen.classList.add("hidden"), 300);
    });

  });
</script>
