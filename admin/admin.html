<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel · INFINITY-CORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: #050509;
      color: #f5f5f7;
      font-family: system-ui, sans-serif;
      padding: 24px;
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(120deg, #ff4b9a, #4be3ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .sub {
      font-size: 13px;
      color: #9b9bb2;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 16px;
      color: #4be3ff;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(120deg, #ff4b9a, #ff8a4b);
      color: #050509;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: none;
      margin-top: 10px;
    }

    .log {
      font-size: 11px;
      color: #9b9bb2;
      margin-top: 10px;
      white-space: pre-line;
    }
  </style>
</head>

<body>
  <div class="title">Admin Panel</div>
  <div class="sub">Internal engine controls, diagnostics, and backend triggers.</div>

  <div class="card">
    <h3>Trigger Render Job</h3>
    <button class="btn" onclick="triggerRender()">Start Render</button>
    <div id="renderLog" class="log"></div>
  </div>

  <div class="card">
    <h3>Credit Controls</h3>
    <button class="btn" onclick="addCredits()">Add Credits</button>
    <button class="btn" onclick="deductCredits()">Deduct Credits</button>
    <div id="creditLog" class="log"></div>
  </div>

  <div class="card">
    <h3>System Events</h3>
    <button class="btn" onclick="emitEvent()">Emit Test Event</button>
    <div id="eventLog" class="log"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
