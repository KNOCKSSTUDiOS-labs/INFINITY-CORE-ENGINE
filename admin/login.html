<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login · INFINITY-CORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: #050509;
      color: #f5f5f7;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px 22px;
      width: 320px;
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
      background: linear-gradient(120deg, #ff4b9a, #4be3ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .sub {
      font-size: 12px;
      color: #9b9bb2;
      margin-bottom: 18px;
    }

    label {
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.4);
      color: #f5f5f7;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(120deg, #ff4b9a, #ff8a4b);
      color: #050509;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: none;
      margin-top: 4px;
    }

    .msg {
      font-size: 11px;
      color: #ff4b9a;
      margin-top: 8px;
      min-height: 14px;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="title">Admin Login</div>
    <div class="sub">Rank-based access · INFINITY-CORE-ENGINE</div>

    <label for="username">Username</label>
    <input id="username" type="text" autocomplete="username" />

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" />

    <button class="btn" id="btnLogin">Enter Engine</button>

    <div id="msg" class="msg"></div>
  </div>

  <script src="login.js"></script>
</body>
</html>
