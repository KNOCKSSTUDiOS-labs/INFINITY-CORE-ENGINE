<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>INFINITY CORE · MOBILE CONTROL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; background:#050509; color:#f5f5f7; font-family:system-ui,sans-serif; }
    .wrap { padding:16px; max-width:480px; margin:0 auto; }
    h1 { font-size:18px; margin-bottom:8px; }
    button { width:100%; padding:10px; margin:6px 0; border-radius:999px; border:none;
             background:linear-gradient(120deg,#ff4b9a,#ff8a4b); color:#050509;
             font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
    input { width:100%; padding:8px; margin:4px 0 10px; border-radius:8px;
            border:1px solid rgba(255,255,255,.16); background:rgba(0,0,0,.4); color:#f5f5f7; }
    .log { font-size:12px; margin-top:10px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>INFINITY CORE · MOBILE</h1>

    <div id="auth">
      <input id="user" placeholder="Username" />
      <input id="pass" type="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
      <button id="logoutBtn">Logout</button>
    </div>

    <button id="startJobBtn">Start Render Job</button>
    <input id="jobId" placeholder="Job ID to check" />
    <button id="checkJobBtn">Check Job</button>
    <button id="listRendersBtn">List Renders</button>

    <div id="log" class="log"></div>
  </div>

  <script>
    const log = (msg) => {
      const el = document.getElementById("log");
      el.textContent = (new Date()).toLocaleTimeString() + " · " + msg + "\n" + el.textContent;
    };

    async function api(path, options = {}) {
      const res = await fetch(path, {
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    document.getElementById("loginBtn").onclick = async () => {
      const username = document.getElementById("user").value.trim();
      const password = document.getElementById("pass").value;
      try {
        const data = await api("/auth/login", {
          method: "POST",
          body: JSON.stringify({ username, password }),
        });
        log("Logged in as " + data.role);
      } catch (e) {
        log("Login error: " + e.message);
      }
    };

    document.getElementById("logoutBtn").onclick = async () => {
      try {
        await api("/auth/logout", { method: "POST" });
        log("Logged out");
      } catch (e) {
        log("Logout error: " + e.message);
      }
    };

    document.getElementById("startJobBtn").onclick = async () => {
      try {
        const data = await api("/api/jobs", { method: "POST", body: JSON.stringify({}) });
        log("Job started: " + data.id);
        document.getElementById("jobId").value = data.id;
      } catch (e) {
        log("Start job error: " + e.message);
      }
    };

    document.getElementById("checkJobBtn").onclick = async () => {
      const id = document.getElementById("jobId").value.trim();
      if (!id) return log("Enter Job ID");
      try {
        const data = await api("/api/jobs/" + id);
        log("Job " + id + " → " + data.status + " (" + data.progress + "%)");
      } catch (e) {
        log("Check job error: " + e.message);
      }
    };

    document.getElementById("listRendersBtn").onclick = async () => {
      try {
        const data = await api("/api/client/renders");
        log("Renders: " + JSON.stringify(data));
      } catch (e) {
        log("List renders error: " + e.message);
      }
    };
  </script>
</body>
</html>
