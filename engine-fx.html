<!-- ============================================================
     INFINITY-CORE-ENGINE // RUNTIME FX ENGINE
     Motion Curves • Transitions • Particles • System FX
     ============================================================ -->

<style id="ascend-fx">

  /* MOTION CURVES */
  :root {
    --fx-curve-soft: cubic-bezier(0.25, 0.1, 0.25, 1);
    --fx-curve-snappy: cubic-bezier(0.4, 0, 0.2, 1);
    --fx-curve-cinematic: cubic-bezier(0.1, 0.7, 0.1, 1);
  }

  /* GLOBAL TRANSITIONS */
  .fx-fade {
    opacity: 0;
    transition: opacity 260ms var(--fx-curve-soft);
  }

  .fx-fade.show {
    opacity: 1;
  }

  .fx-slide-up {
    transform: translateY(20px);
    opacity: 0;
    transition: transform 300ms var(--fx-curve-cinematic), opacity 300ms var(--fx-curve-cinematic);
  }

  .fx-slide-up.show {
    transform: translateY(0);
    opacity: 1;
  }

  .fx-slide-down {
    transform: translateY(-20px);
    opacity: 0;
    transition: transform 300ms var(--fx-curve-cinematic), opacity 300ms var(--fx-curve-cinematic);
  }

  .fx-slide-down.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* PARTICLE HOOKS */
  .fx-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--accent-primary);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.8;
    animation: fx-pulse 600ms ease-out forwards;
  }

  @keyframes fx-pulse {
    0% { transform: scale(0.4); opacity: 1; }
    100% { transform: scale(1.8); opacity: 0; }
  }

</style>

<script>
  document.addEventListener("DOMContentLoaded", () => {

    /* PARTICLE EMITTER */
    document.body.addEventListener("click", (e) => {
      const p = document.createElement("div");
      p.className = "fx-particle";
      p.style.left = e.clientX + "px";
      p.style.top = e.clientY + "px";
      document.body.appendChild(p);

      setTimeout(() => p.remove(), 600);
    });

    /* GLOBAL FX TOGGLES */
    document.body.setAttribute("data-fx-enabled", "true");
  });
</script>
