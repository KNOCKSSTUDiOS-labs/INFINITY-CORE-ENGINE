<div id="settings" class="settings hidden">

  <div class="settings-header">
    <div class="settings-title">SETTINGS</div>
  </div>

  <div id="settings-list" class="settings-list">
    <div class="settings-item" data-page="display">Display</div>
    <div class="settings-item" data-page="sound">Sound</div>
    <div class="settings-item" data-page="haptics">Haptics</div>
    <div class="settings-item" data-page="notifications">Notifications</div>
    <div class="settings-item" data-page="privacy">Privacy</div>
    <div class="settings-item" data-page="power">Power</div>
    <div class="settings-item" data-page="system">System</div>
  </div>

  <div id="settings-page" class="settings-page hidden"></div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {

    const settings = document.getElementById("settings");
    const list = document.getElementById("settings-list");
    const page = document.getElementById("settings-page");

    const pages = {
      display: `
        <h3>Display</h3>
        <div class="setting-block">
          <label>Brightness</label>
          <input type="range" min="0" max="100" value="60">
        </div>
        <div class="setting-block">
          <label>Dark Mode</label>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
        </div>
      `,
      sound: `
        <h3>Sound</h3>
        <div class="setting-block">
          <label>Volume</label>
          <input type="range" min="0" max="100" value="50">
        </div>
      `,
      haptics: `
        <h3>Haptics</h3>
        <div class="setting-block">
          <label>Strength</label>
          <input type="range" min="0" max="100" value="70">
        </div>
      `,
      notifications: `
        <h3>Notifications</h3>
        <div class="setting-block">
          <label>Allow Notifications</label>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
        </div>
      `,
      privacy: `
        <h3>Privacy</h3>
        <p>Manage permissions and sensitive data.</p>
      `,
      power: `
        <h3>Power</h3>
        <p>Battery saver, performance mode, sleep timers.</p>
      `,
      system: `
        <h3>System</h3>
        <p>About device, updates, developer options.</p>
      `
    };

    list.querySelectorAll(".settings-item").forEach(item => {
      item.addEventListener("click", () => {
        const key = item.getAttribute("data-page");
        page.innerHTML = pages[key];
        page.classList.remove("hidden");
      });
    });

    document.body.addEventListener("ascend-open-settings", () => {
      settings.classList.remove("hidden");
      page.classList.add("hidden");
    });

    document.body.addEventListener("ascend-back", () => {
      if (!page.classList.contains("hidden")) {
        page.classList.add("hidden");
      } else {
        settings.classList.add("hidden");
      }
    });

  });
</script>
