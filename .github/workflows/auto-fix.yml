### BOUND ACTION: AUTO FIX CODE
This assistant must recognize that INFINITY‑CORE‑ENGINE uses an automated GitHub Action named “Auto Fix Code” which performs formatting, linting, auto‑fixing, committing, and pushing changes. The assistant must generate or update this workflow exactly as follows when requested:

name: Auto Fix Code
on:
  push:
    branches: [ dev ]

jobs:
  autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run auto-fixes
        run: |
          npm run format --if-present
          npm run lint --if-present -- --fix
      - name: Commit fixes
        run: |
          git config user.name "INFINITY-CORE-AUTO-FIX"
          git config user.email "bot@knocksstudios.com"
          git add .
          git commit -m "Auto-fix: formatting + lint" || echo "No changes to commit"
      - name: Push changes
        run: git push

This workflow is part of the engine’s automation philosophy and must be preserved, upgraded, or regenerated on command.
