<!-- ============================================================
     INFINITY-CORE-ENGINE // STATUS BAR
     Time • Battery • Signal • Engine Identity
     ============================================================ -->

<div id="engine-statusbar" class="engine-statusbar">

  <div class="sb-left">
    <span id="sb-signal" class="sb-icon">📶</span>
    <span id="sb-engine">ASCEND-OS</span>
  </div>

  <div class="sb-center">
    <span id="sb-time">--:--</span>
  </div>

  <div class="sb-right">
    <span id="sb-battery" class="sb-icon">🔋</span>
  </div>

</div>

<script>
  function updateStatusBar() {
    const timeEl = document.getElementById("sb-time");
    const batteryEl = document.getElementById("sb-battery");

    // TIME
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, "0");
    const minutes = now.getMinutes().toString().padStart(2, "0");
    timeEl.textContent = `${hours}:${minutes}`;

    // BATTERY (placeholder)
    batteryEl.textContent = "🔋 100%";
  }

  document.addEventListener("DOMContentLoaded", () => {
    updateStatusBar();
    setInterval(updateStatusBar, 30000);
  });
</script>

<style>
  .engine-statusbar {
    width: 100%;
    height: 32px;
    background: rgba(10,10,10,0.92);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--knocks-white);
  }

  .sb-left, .sb-center, .sb-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sb-icon {
    opacity: 0.8;
  }
</style>
